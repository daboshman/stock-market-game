runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Client-side Firebase config (public values, baked into JS bundle at build time)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyBZ9v4DaxvsKz1m_Pv3JLIoFvYtBBwDHyc"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "stock-market-game-a94b2.firebaseapp.com"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "stock-market-game-a94b2"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "stock-market-game-a94b2.firebasestorage.app"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "534983052283"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:534983052283:web:efaf56fa13500b84f9d95e"
    availability:
      - BUILD

  # Server-side Firebase Admin config
  - variable: FIREBASE_PROJECT_ID
    value: "stock-market-game-a94b2"
    availability:
      - RUNTIME

  - variable: FIREBASE_CLIENT_EMAIL
    value: "firebase-adminsdk-fbsvc@stock-market-game-a94b2.iam.gserviceaccount.com"
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME

  # Market data
  - variable: FINNHUB_API_KEY
    secret: FINNHUB_API_KEY
    availability:
      - RUNTIME

  - variable: POLYGON_API_KEY
    secret: POLYGON_API_KEY
    availability:
      - RUNTIME

  # Game config
  - variable: DEFAULT_STARTING_BALANCE
    value: "100000"
    availability:
      - RUNTIME
